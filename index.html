<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ruta de Adopción de IA - EPI-USE</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #001844; }
    #loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; font-family: sans-serif; color: #fff; z-index: 9999; }
  </style>
</head>
<body>
  <div id="loader"><p>Cargando...</p></div>
  <script>
    fetch('app.html').then(function(r) { return r.text(); }).then(function(html) {
      document.open();
      document.write(html);
      document.close();
    });
  </script>
</body>
</html>
